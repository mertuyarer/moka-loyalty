<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Moka Coffee & Croissant — Sadakat</title>
  <link rel="icon" href="/logos/logo-dark.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    :root{--black:#0D0D0D;--white:#fff;--offwhite:#F7F7F7;--gray:#E0E0E0;--midgray:#999;--darkgray:#333}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--offwhite);min-height:100vh;color:var(--black)}

    .cust-header{background:var(--black);padding:28px 24px 22px;text-align:center}
    .cust-logo{width:100px;height:100px;border-radius:50%;margin:0 auto;overflow:hidden}
    .cust-logo img{width:100%;height:100%;object-fit:cover}

    .input-wrap{padding:24px 20px 0}
    .input-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--midgray);margin-bottom:8px}
    .phone-input{width:100%;padding:14px 16px;border:1.5px solid var(--gray);border-radius:11px;font-size:20px;font-family:'DM Sans',sans-serif;color:var(--black);background:var(--white);letter-spacing:2px;outline:none;transition:border-color .2s}
    .phone-input:focus{border-color:var(--black)}
    .earn-btn{width:100%;margin-top:10px;padding:15px;background:var(--black);color:var(--white);border:none;border-radius:11px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s;letter-spacing:.5px}
    .earn-btn:hover{opacity:.8}
    .earn-btn:disabled{opacity:.35;cursor:not-allowed}

    .card-wrap{padding:16px 20px 32px}
    .loyalty-card{background:var(--white);border-radius:16px;border:1px solid var(--gray);padding:20px;display:none}
    .loyalty-card.v{display:block;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .card-lbl{font-size:10px;color:var(--midgray);letter-spacing:1px}
    .card-phone{font-size:16px;font-weight:500;color:var(--black);margin-top:2px}
    .card-prog{font-size:12px;color:var(--black);font-weight:500}
    .pots-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:14px 0}
    .card-msg{text-align:center;font-size:12px;color:var(--midgray);padding-top:12px;border-top:1px solid var(--gray);line-height:1.6}
    .card-msg.ok{color:var(--black);font-weight:500;font-size:13px}

    .notice{border-radius:11px;padding:14px 16px;margin-bottom:14px;text-align:center;display:none}
    .notice.v{display:block;animation:fadeUp .3s ease}
    .notice.reward{background:var(--black);color:var(--white)}
    .notice.warn{background:var(--offwhite);border:1.5px solid var(--gray);color:var(--darkgray)}
    .notice-title{font-weight:500;font-size:15px}
    .notice-sub{font-size:11px;opacity:.6;margin-top:3px}

    /* token giriş modu */
    .token-mode{background:var(--white);border-radius:16px;border:1px solid var(--gray);padding:24px 20px;text-align:center;display:none}
    .token-mode.v{display:block;animation:fadeUp .3s ease}
    .token-title{font-size:14px;font-weight:500;color:var(--black);margin-bottom:6px}
    .token-sub{font-size:12px;color:var(--midgray);margin-bottom:16px;line-height:1.6}
    .confirm-btn{width:100%;padding:14px;background:var(--black);color:var(--white);border:none;border-radius:11px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}
    .confirm-btn:disabled{opacity:.35;cursor:not-allowed}
  </style>
</head>
<body>

<div class="cust-header">
  <div class="cust-logo"><img src="/logos/logo-dark.png" alt="Moka"></div>
</div>

<div class="input-wrap">
  <div class="input-label">Telefon numaranız</div>
  <input type="tel" class="phone-input" id="phone-in" placeholder="05xx xxx xx xx" maxlength="11">
  <button class="earn-btn" id="earn-btn" onclick="lookupPhone()">Kartımı Gör</button>
</div>

<div class="card-wrap">
  <div class="notice reward" id="reward-notice">
    <div class="notice-title">🎉 Bedava kahve kazandınız!</div>
    <div class="notice-sub">6 kahveniz doldu — 7. bu seferki tamamen bedava!</div>
  </div>
  <div class="notice warn" id="warn-notice">
    <div class="notice-title" id="warn-title"></div>
    <div class="notice-sub" id="warn-sub"></div>
  </div>

  <!-- Telefon girildikten sonra, token geçerliyse puan onayı -->
  <div class="token-mode" id="token-mode">
    <div class="token-title">☕ Kasiyerden QR taradınız</div>
    <div class="token-sub">Puan eklemek için onaylayın.</div>
    <button class="confirm-btn" id="confirm-btn" onclick="confirmEarn()">Puanı Onayla</button>
  </div>

  <div class="loyalty-card" id="loyalty-card">
    <div class="card-top">
      <div><div class="card-lbl">Sadakat Kartı</div><div class="card-phone" id="card-phone"></div></div>
      <div class="card-prog" id="card-prog"></div>
    </div>
    <div class="pots-grid" id="pots-grid"></div>
    <div class="card-msg" id="card-msg"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://osanflfqiifuaalkpslt.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zYW5mbGZxaWlmdWFhbGtwc2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzM1ODMsImV4cCI6MjA5MzEwOTU4M30.P8hJlJjaKBRxf6F6m_JjotAs_srgJ8BmJ5aspq9Ygko';
const GOAL=7,STAMP=6,TOKEN_TTL=60000;
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

let currentToken=null, currentPhone=null, currentCust=null;

async function sbGet(table,filter=''){const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`,{headers:H});return r.json();}
async function sbUpsert(table,data){await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(data)});}
async function sbPatch(table,filter,data){await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`,{method:'PATCH',headers:H,body:JSON.stringify(data)});}

// URL'den token al
const urlToken = new URLSearchParams(location.search).get('token');

async function lookupPhone(){
  const raw=document.getElementById('phone-in').value.replace(/\D/g,'');
  if(raw.length<10){alert('Geçerli bir telefon numarası girin.');return;}
  currentPhone=raw;

  const btn=document.getElementById('earn-btn');
  btn.disabled=true; btn.textContent='Aranıyor...';

  try{
    const rows=await sbGet('loyalty',`phone=eq.${raw}`);
    currentCust=rows?.[0]||{phone:raw,cups:0,rewards:0,last_seen:0};

    // Token var mı ve geçerli mi?
    if(currentToken){
      // token geçerli — onay ekranı göster
      document.getElementById('token-mode').classList.add('v');
      document.getElementById('loyalty-card').classList.add('v');
      renderCard(currentCust,false);
    } else {
      // Token yok — sadece kartı göster
      document.getElementById('loyalty-card').classList.add('v');
      renderCard(currentCust,false);
      showWarn('Puan kazanmak için kasiyerden QR tarayın','Kasiyere kahvenizi aldıktan sonra QR göstermesini isteyin.');
    }
  }catch(e){alert('Bağlantı hatası.');}
  btn.disabled=false; btn.textContent='Kartımı Gör';
}

async function confirmEarn(){
  if(!currentToken||!currentPhone||!currentCust)return;
  const btn=document.getElementById('confirm-btn');
  btn.disabled=true; btn.textContent='İşleniyor...';

  try{
    // Token hâlâ geçerli mi ve kullanılmamış mı?
    const trows=await sbGet('tokens',`token=eq.${currentToken}`);
    const tok=trows?.[0];
    if(!tok){showWarn('QR bulunamadı','Geçersiz kod.');btn.disabled=false;btn.textContent='Puanı Onayla';return;}
    if(tok.used){showWarn('Bu QR daha önce kullanıldı','Kasiyerden yeni QR isteyin.');btn.disabled=false;btn.textContent='Puanı Onayla';return;}
    if(Date.now()-tok.created_at>TOKEN_TTL){showWarn('QR süresi doldu ⏱','Kasiyerden yeni QR isteyin.');btn.disabled=false;btn.textContent='Puanı Onayla';return;}

    // Token kullanıldı olarak işaretle
    await sbPatch('tokens',`token=eq.${currentToken}`,{used:true});

    // Puanı ekle
    const cust={...currentCust, last_seen:Date.now(), cups:currentCust.cups+1};
    let reward=false;
    if(cust.cups>=GOAL){cust.cups=0;cust.rewards++;reward=true;
      // meta güncelle
      const m=await sbGet('meta','id=eq.global');
      const meta=m?.[0]||{id:'global',total_rewards:0};
      meta.total_rewards++;
      await sbUpsert('meta',meta);
    }
    await sbUpsert('loyalty',cust);
    currentCust=cust;

    document.getElementById('token-mode').classList.remove('v');
    document.getElementById('reward-notice').classList.toggle('v',reward);
    renderCard(cust,reward);
    // URL'i temizle
    history.replaceState({},'',location.pathname);
    currentToken=null;
  }catch(e){alert('Hata oluştu, tekrar deneyin.');}
  btn.disabled=false; btn.textContent='Puanı Onayla';
}

function showWarn(title,sub){
  document.getElementById('warn-title').textContent=title;
  document.getElementById('warn-sub').textContent=sub;
  document.getElementById('warn-notice').classList.add('v');
}

function renderCard(cust,reward){
  document.getElementById('card-phone').textContent=fmt(cust.phone);
  document.getElementById('card-prog').textContent=reward?'🎉 Bedava!':`${cust.cups}/${STAMP}`;
  const grid=document.getElementById('pots-grid');grid.innerHTML='';
  for(let i=0;i<GOAL;i++){
    const isFree=i===GOAL-1,filled=!reward&&i<cust.cups;
    const d=document.createElement('div');
    d.innerHTML=makePot(filled,isFree,i*80);
    grid.appendChild(d);
  }
  const msg=document.getElementById('card-msg');
  if(reward){msg.className='card-msg ok';msg.textContent='Harika! 7. kahveniz bu sefer bedava. Afiyet olsun ☕';}
  else{msg.className='card-msg';const l=STAMP-cust.cups;msg.textContent=l>0?`${l} kahve daha, bedava 7. kahveniz sizi bekliyor!`:'Bir daha! Sonraki kahveniz bedava — söylemeyi unutmayın!';}
}

function makePot(filled,isFree,delay){
  const s='#0D0D0D', f=filled?'#0D0D0D':'none';
  return`<svg viewBox="0 0 36 46" width="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 28 L8 42 Q8 44 10 44 L26 44 Q28 44 28 42 L26 28 Z" stroke="${s}" stroke-width="1.5" stroke-linejoin="round" fill="${f}"/>
    ${filled?`<clipPath id="cp${delay}"><path d="M10 28 L8 42 Q8 44 10 44 L26 44 Q28 44 28 42 L26 28 Z"/></clipPath>
    <rect x="8" y="14" width="20" height="14" clip-path="url(#cp${delay})" fill="#0D0D0D"><animate attributeName="height" from="0" to="14" dur="0.5s" begin="${delay}ms" fill="freeze"/><animate attributeName="y" from="28" to="14" dur="0.5s" begin="${delay}ms" fill="freeze"/></rect>`:''}
    <rect x="9" y="26" width="18" height="3" rx="1.5" stroke="${s}" stroke-width="1.5" fill="${f}"/>
    <path d="M11 26 L11 16 Q11 12 18 12 Q25 12 25 16 L25 26" stroke="${s}" stroke-width="1.5" stroke-linejoin="round" fill="${f}"/>
    <path d="M25 20 Q32 18 31 13" stroke="${s}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="18" cy="12" rx="5" ry="2" stroke="${s}" stroke-width="1.5" fill="${f}"/>
    <rect x="17" y="8" width="2" height="4" rx="1" fill="${s}"/>
    ${filled?`<path d="M14 9 Q13 6 14 3" stroke="${s}" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"><animate attributeName="opacity" values="0;0.4;0" dur="1.5s" begin="${delay}ms" repeatCount="indefinite"/></path>
    <path d="M18 8 Q17 5 18 2" stroke="${s}" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"><animate attributeName="opacity" values="0;0.4;0" dur="1.5s" begin="${delay+200}ms" repeatCount="indefinite"/></path>`:''}
    ${isFree?`<text x="18" y="38" text-anchor="middle" font-size="9" fill="${filled?'#fff':'#0D0D0D'}" font-family="sans-serif">★</text>`:''}
  </svg>`;
}

function fmt(p){
  if(p.length===11)return p.replace(/(\d{4})(\d{3})(\d{2})(\d{2})/,'$1 $2 $3 $4');
  if(p.length===10)return p.replace(/(\d{3})(\d{3})(\d{2})(\d{2})/,'$1 $2 $3 $4');
  return p;
}

document.getElementById('phone-in').addEventListener('keydown',e=>{if(e.key==='Enter')lookupPhone();});

// Token URL'den geldiyse doğrula
if(urlToken){
  currentToken=urlToken;
  document.getElementById('earn-btn').textContent='Puan Kazan ☕';
  // Telefon girip onaylasın
}
</script>
</body>
</html>
